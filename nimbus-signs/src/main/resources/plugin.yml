name: NimbusSigns
version: '0.1.0'
main: dev.nimbus.signs.NimbusSignsPlugin
api-version: '1.20'
description: Server selector signs for Nimbus cloud networks
author: Nimbus
depend: [NimbusSDK]

commands:
  nsign:
    description: Manage Nimbus server selector signs
    permission: nimbus.signs.create
    usage: /nsign <set|remove|list|reload>
    aliases: [nimbussign]

permissions:
  nimbus.signs.create:
    description: Create and list Nimbus signs
    default: op
  nimbus.signs.remove:
    description: Remove Nimbus signs
    default: op
  nimbus.signs.reload:
    description: Reload signs config
    default: op
