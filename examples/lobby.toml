[group]
name = "Lobby"
type = "DYNAMIC"
template = "lobby"
software = "PURPUR"
version = "1.21.11"

[group.resources]
memory = "1G"
max_players = 50

[group.scaling]
min_instances = 1
max_instances = 4
players_per_instance = 40
scale_threshold = 0.8
idle_timeout = 0                # Lobbies stay running

[group.lifecycle]
stop_on_empty = false
restart_on_crash = true
max_restarts = 5

[group.jvm]
optimize = true
