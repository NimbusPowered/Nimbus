[group]
name = "BedWars"
type = "DYNAMIC"
template = "bedwars"
software = "PAPER"
version = "1.21.11"

[group.resources]
memory = "2G"
max_players = 16

[group.scaling]
min_instances = 1
max_instances = 10
players_per_instance = 16
scale_threshold = 0.75
idle_timeout = 300              # Shutdown after 5 min empty

[group.lifecycle]
stop_on_empty = true            # Stop game servers when empty
restart_on_crash = true
max_restarts = 3

[group.jvm]
optimize = true
