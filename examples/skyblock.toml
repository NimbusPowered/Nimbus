[group]
name = "SkyBlock"
type = "DYNAMIC"
template = "skyblock"
software = "PAPER"
version = "1.8.8"

[group.resources]
memory = "2G"
max_players = 50

[group.scaling]
min_instances = 1
max_instances = 3
players_per_instance = 40
scale_threshold = 0.8
idle_timeout = 0                # Never shutdown (persistent world)

[group.lifecycle]
stop_on_empty = false
restart_on_crash = true
max_restarts = 5

[group.jvm]
optimize = true
