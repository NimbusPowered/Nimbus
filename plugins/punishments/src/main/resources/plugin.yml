name: NimbusPunishments
version: '${version}'
main: dev.nimbuspowered.nimbus.punishments.NimbusPunishmentsPlugin
description: Network-wide punishment enforcement for Nimbus cloud networks
author: NimbusPowered
depend:
  - NimbusSDK
folia-supported: true
commands:
  ban:
    description: Ban a player permanently
    usage: /ban <player> <reason>
    permission: nimbus.punish.ban
  tempban:
    description: Ban a player temporarily
    usage: /tempban <player> <duration> <reason>
    permission: nimbus.punish.tempban
  mute:
    description: Mute a player permanently
    usage: /mute <player> <reason>
    permission: nimbus.punish.mute
  tempmute:
    description: Mute a player temporarily
    usage: /tempmute <player> <duration> <reason>
    permission: nimbus.punish.tempmute
  kick:
    description: Kick a player
    usage: /kick <player> <reason>
    permission: nimbus.punish.kick
    aliases: [pkick]
  warn:
    description: Warn a player
    usage: /warn <player> <reason>
    permission: nimbus.punish.warn
  unban:
    description: Revoke an active ban
    usage: /unban <player>
    permission: nimbus.punish.unban
  unmute:
    description: Revoke an active mute
    usage: /unmute <player>
    permission: nimbus.punish.unmute
  history:
    description: Show punishment history for a player
    usage: /history <player>
    permission: nimbus.punish.history
permissions:
  nimbus.punish.*:
    description: All punishment commands
    default: op
    children:
      nimbus.punish.ban: true
      nimbus.punish.tempban: true
      nimbus.punish.mute: true
      nimbus.punish.tempmute: true
      nimbus.punish.kick: true
      nimbus.punish.warn: true
      nimbus.punish.unban: true
      nimbus.punish.unmute: true
      nimbus.punish.history: true
      nimbus.punish.bypass: false
  nimbus.punish.bypass:
    description: Bypass mute enforcement (staff)
    default: false
