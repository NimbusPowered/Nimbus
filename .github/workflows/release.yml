name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0) — leave empty to use gradle.properties'
        required: false
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(grep 'nimbusVersion=' gradle.properties | cut -d'=' -f2 | tr -d '\r\n')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Build project
        run: ./gradlew shadowJar

      - name: Generate checksums
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sha256sum nimbus-core/build/libs/nimbus-core-${VERSION}.jar > SHA256SUMS.txt
          sha256sum nimbus-agent/build/libs/nimbus-agent-${VERSION}.jar >> SHA256SUMS.txt
          sha256sum nimbus-cli/build/libs/nimbus-cli-${VERSION}.jar >> SHA256SUMS.txt
          echo "Generated checksums:"
          cat SHA256SUMS.txt

      - name: Verify release assets
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Controller: nimbus-core-${VERSION}.jar ($(du -h nimbus-core/build/libs/nimbus-core-${VERSION}.jar | cut -f1))"
          echo "Agent: nimbus-agent-${VERSION}.jar ($(du -h nimbus-agent/build/libs/nimbus-agent-${VERSION}.jar | cut -f1))"
          echo "CLI: nimbus-cli-${VERSION}.jar ($(du -h nimbus-cli/build/libs/nimbus-cli-${VERSION}.jar | cut -f1))"

      - name: Create Release Draft
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Nimbus ${{ steps.version.outputs.tag }}
          draft: true
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            nimbus-core/build/libs/nimbus-core-${{ steps.version.outputs.version }}.jar
            nimbus-agent/build/libs/nimbus-agent-${{ steps.version.outputs.version }}.jar
            nimbus-cli/build/libs/nimbus-cli-${{ steps.version.outputs.version }}.jar
            SHA256SUMS.txt
          body: |
            ## Nimbus ${{ steps.version.outputs.tag }}

            ### Installation

            **Controller (Linux/macOS):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
            ```

            **Controller (Windows):**
            ```powershell
            irm https://raw.githubusercontent.com/${{ github.repository }}/main/install.ps1 | iex
            ```

            **Agent (Linux/macOS):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install-agent.sh | bash
            ```

            **Agent (Windows):**
            ```powershell
            irm https://raw.githubusercontent.com/${{ github.repository }}/main/install-agent.ps1 | iex
            ```

            **Remote CLI (Linux/macOS):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install-cli.sh | bash
            ```

            **Remote CLI (Windows):**
            ```powershell
            irm https://raw.githubusercontent.com/${{ github.repository }}/main/install-cli.ps1 | iex
            ```

            ### Changes
